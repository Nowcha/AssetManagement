<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>AssetManagement</title>
    <script>
      // GitHub Pages SPA リダイレクト
      // パスをクエリパラメータに変換してindex.htmlに渡す
      const segmentCount = 1 // /AssetManagement/ の depth
      const l = window.location
      l.replace(
        l.protocol +
          '//' +
          l.hostname +
          (l.port ? ':' + l.port : '') +
          l.pathname
            .split('/')
            .slice(0, 1 + segmentCount)
            .join('/') +
          '/?p=/' +
          l.pathname
            .slice(1)
            .split('/')
            .slice(segmentCount)
            .join('/')
            .replace(/&/g, '~and~') +
          (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
          l.hash,
      )
    </script>
  </head>
  <body></body>
</html>
